<h2 id="bulk-ping"><a href="https://github.com/thevillagehacker/Bulk-Ping">Bulk-Ping</a></h2>
<p>A tool made in bash to ping Multiple Targets from file and output the results in separate files.</p>

<h2 id="usage">Usage</h2>
<div class="language-sh highlighter-rouge"><div class="highlight"><pre class="highlight"><code><span class="nb">chmod</span> +x bulk_ping.sh
</code></pre></div></div>

<h2 id="ping-bulk-targets-from-a-file">Ping Bulk targets from a file</h2>
<div class="language-plaintext highlighter-rouge"><div class="highlight"><pre class="highlight"><code>./bulk-ping.sh -f &lt;filename&gt;
</code></pre></div></div>
